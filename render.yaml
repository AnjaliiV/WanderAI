services:
  - type: web
    name: aitrip-planner
    env: node
    buildCommand: npm install
    startCommand: npm run seed && npm start
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DB_PATH
        value: /data/aitrip.db
      - key: NODE_ENV
        value: production
